networks:
  nginx-proxy-manager:
    external: true
  analytics:
    external: true

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    networks:
      - nginx-proxy-manager
      - analytics
    user: ${PUID:-950}
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    volumes:
      - ./prometheus:/etc/prometheus
      - ./data:/prometheus
    restart: unless-stopped
    labels:
      glance.name: Prometheus
      glance.icon: si:prometheus
      glance.url: https://prometheus.home.gerardgascon.com
      glance.description: Metrics & Monitoring
      glance.category: services
      glance.hide: false
      glance.id: prometheus

  # pihole-exporter:
  #   container_name: pihole-exporter
  #   image: ekofr/pihole-exporter:latest
  #   env_file:
  #     - pihole-exporter.env
  #   environment:
  #     - PIHOLE_HOSTNAME=pihole
  #     - PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
  #     - INTERVAL=60s
  #     - PORT=9617
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "5k"
  #       max-file: "5"
  #   healthcheck:
  #     test: ["CMD", "wget", "--tries=1", "--spider", "http://localhost:9617/metrics"]
  #     interval: 300s
  #     retries: 5
  #     timeout: 10s
  #   restart: unless-stopped
  node-exporter:
    container_name: node-exporter
    image: quay.io/prometheus/node-exporter:latest
    networks:
      - analytics
    command:
      - '--path.rootfs=/host'
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
    labels:
      glance.name: Node exporter
      glance.category: services
      glance.hide: false
      glance.parent: prometheus

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    networks:
      - analytics
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: unless-stopped
    labels:
      glance.name: cAdvisor
      glance.category: services
      glance.hide: false
      glance.parent: prometheus
