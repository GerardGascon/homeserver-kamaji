services:
  beszel:
    image: henrygd/beszel
    container_name: beszel
    networks:
      - nginx-proxy-manager
    volumes:
      - ./beszel_data:/beszel_data
    healthcheck:
      # The URL is relative to the container, not the host
      test: ['CMD', '/beszel', 'health', '--url', 'http://localhost:8090']
      start_period: 5s # Check 5 seconds after the container starts
      interval: 120s # Then check every 120 seconds after that
    restart: unless-stopped

  beszel-agent:
    image: henrygd/beszel-agent-nvidia
    container_name: beszel-agent
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
      # monitor other disks / partitions by mounting a folder in /extra-filesystems
      - /mnt/storage0/storage/media/.beszel:/extra-filesystems/sda1__Storage:ro
      - /mnt/NVMe/photos/.beszel:/extra-filesystems/sdb1__Photos:ro
    env_file:
      - .env
    environment:
      - LISTEN=45876
      - KEY=${KEY}
      - TOKEN=${TOKEN}
      - HUB_URL=https://beszel.home.gerardgascon.com
    # healthcheck:
    #   test: ['CMD', '/agent', 'health']
    #   interval: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - utility
    restart: unless-stopped

networks:
  nginx-proxy-manager:
    external: true