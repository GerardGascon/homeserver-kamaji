networks:
  arr-network:
    name: arr-network
    ipam:
      config:
        - subnet: 172.39.0.0/24
  nginx-proxy-manager:
    external: true

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    networks:
      arr-network:
        ipv4_address: 172.39.0.2
    ports:
      - 8080:8080 # qbittorrent web interface
      - ${FIREWALL_VPN_INPUT_PORTS}:${FIREWALL_VPN_INPUT_PORTS} # qbittorrent torrent port
      - 6789:6789 # nzbget
      - 9696:9696 # prowlarr
      - 9117:9117 # jackett
      - 8191:8191 # flaresolverr
    volumes:
      - ./gluetun:/gluetun
    env_file:
      - .env
    environment:
      - BLOCK_MALICIOUS=off
      - HEALTH_TARGET_ADDRESSES=www.google.com
      - DNS_ADDRESS=8.8.8.8
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    labels:
      glance.name: Gluetun
      glance.icon: si:wireguard
      glance.description: VPN Connection
      glance.category: arr-stack
      glance.hide: false
      glance.id: arr-gluetun

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=${FIREWALL_VPN_INPUT_PORTS}
    volumes:
      - ./qbittorrent:/config
      - /mnt/NVMe/downloads/qbittorrent:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:gluetun
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      deunhealth.restart.on.unhealthy: true
      glance.name: qBittorrent
      glance.icon: si:qbittorrent
      glance.description: BitTorrent Client
      glance.url: https://qbittorrent.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: qbittorrent
  
  deunhealth:
    image: qmcgaw/deunhealth
    container_name: deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=${TZ:-Etc/UTC}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./nzbget:/config
      - /mnt/NVMe/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    network_mode: service:gluetun
    labels:
      glance.name: NZBget
      glance.icon: si:abdownloadmanager
      glance.description: NZB Downloader
      glance.url: https://nzbget.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: nzbget

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./prowlarr:/config
    restart: unless-stopped
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:gluetun
    labels:
      glance.name: Prowlarr
      glance.icon: si:bittorrent
      glance.description: Indexer Manager
      glance.url: https://prowlarr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: prowlarr
  
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FILE=${LOG_FILE:-none}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ:-Etc/UTC}
    network_mode: service:gluetun
    volumes:
      - /var/lib/flaresolver:/config
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
      - AUTO_UPDATE=true
    volumes:
      - ./jackett:/config
      - /mnt/NVMe/downloads:/downloads
    depends_on:
      gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:gluetun
    restart: unless-stopped
    labels:
      glance.name: Jackett
      glance.icon: si:bittorrent
      glance.description: Indexer Manager
      glance.url: https://jackett.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: jackett

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonarr:/config
      - /mnt/storage0/media:/data/media
      - /mnt/NVMe/downloads/qbittorrent/completed:/downloads/completed
    networks:
      arr-network:
        ipv4_address: 172.39.0.3
      nginx-proxy-manager: {}
    labels:
      glance.name: Sonarr
      glance.icon: si:sonarr
      glance.description: Shows Collection Manager
      glance.url: https://sonarr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: sonarr

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=3000
      - PGID=3000
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./radarr:/config
      - /mnt/storage0/media/Movies:/data/Movies
      - /mnt/storage0/media:/data/media
      - /mnt/NVMe/downloads/qbittorrent/completed:/downloads/completed
    networks:
      arr-network:
        ipv4_address: 172.39.0.4
      nginx-proxy-manager: {}
    labels:
      glance.name: Radarr
      glance.icon: si:radarr
      glance.description: Movie Collection Manager
      glance.url: https://radarr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: radarr

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./lidarr:/config
      - /mnt/storage0/media:/data/media
      - /mnt/NVMe/downloads/qbittorrent/completed:/downloads/completed
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
    networks:
      arr-network:
        ipv4_address: 172.39.0.5
      nginx-proxy-manager: {}
    labels:
      glance.name: Lidarr
      glance.icon: si:sonarr
      glance.description: Music Collection Manager
      glance.url: https://lidarr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: lidarr

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./bazarr:/config
      - /mnt/storage0/media:/data/media
      - /mnt/NVMe/downloads/qbittorrent/completed:/downloads/completed
    networks:
      arr-network:
        ipv4_address: 172.39.0.6
      nginx-proxy-manager: {}
    labels:
      glance.name: Bazarr
      glance.icon: si:sonarr
      glance.description: Subtitle Collection Manager
      glance.url: https://bazarr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: bazarr

  jellyseerr:
    container_name: jellyseerr
    image: ghcr.io/seerr-team/seerr:latest
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./jellyseerr:/app/config
    networks:
      arr-network:
        ipv4_address: 172.39.0.9
      nginx-proxy-manager: {}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    labels:
      glance.name: Seerr
      glance.icon: si:jellyfin
      glance.description: Media Request Manager
      glance.url: https://seerr.home.gerardgascon.com
      glance.category: arr-stack
      glance.hide: false
      glance.id: seerr
