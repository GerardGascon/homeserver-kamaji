networks:
  nginx-proxy-manager:
    external: true

services:
  gateway-gluetun:
    image: qmcgaw/gluetun
    container_name: gateway-gluetun
    networks:
      nginx-proxy-manager: {}
    cap_add:
      - NET_ADMIN
    volumes:
      - ./gluetun:/gluetun
    env_file:
      - .env
    environment:
      - BLOCK_MALICIOUS=off
      - HEALTH_TARGET_ADDRESSES=www.google.com
      - DNS_ADDRESS=8.8.8.8
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    labels:
      glance.name: Gluetun
      glance.category: services
      glance.hide: false
      glance.parent: gateway
  
  gateway-nginx:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: gateway-nginx
    network_mode: service:gateway-gluetun
    environment:
      - TZ=${TZ:-Etc/UTC}
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      timeout: 3s
    labels:
      glance.name: Gateway
      glance.icon: si:wireguard
      glance.url: https://gateway.kamaji.gerardgascon.com
      glance.description: VPN Access Proxy
      glance.category: services
      glance.hide: false
      glance.id: gateway
