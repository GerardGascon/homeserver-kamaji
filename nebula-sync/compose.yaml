services:
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    environment:
    - PRIMARY=https://pihole.kamaji.gerardgascon.com|${PIHOLE_PASSWORD}
    - REPLICAS=https://pihole.sakamoto.gerardgascon.com|${PIHOLE_PASSWORD}
    - FULL_SYNC=true
    - RUN_GRAVITY=true
    - CRON=0 * * * *
    restart: unless-stopped
    labels:
      glance.parent: pihole
      glance.name: Nebula Sync
      glance.category: services
      glance.hide: false