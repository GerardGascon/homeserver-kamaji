services:
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    environment:
    - PRIMARY=https://pihole.home.gerardgascon.com|${PIHOLE_PASSWORD}
    - REPLICAS=https://pihole.pi.gerardgascon.com|${PIHOLE_PASSWORD}
    - FULL_SYNC=true
    - RUN_GRAVITY=true
    - CRON=0 * * * *
    restart: unless-stopped