services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    env_file:
      - .env
    environment:
      - PUID=${PUID:-950}
      - PGID=${PGID:-950}
      - TZ=${TZ:-Etc/UTC}
      - PASSWORD=${PASSWORD}
    volumes:
      - ./config:/config
      - /mnt/NVMe/apps:/services
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    labels:
      glance.name: Code Server
      glance.icon: si:htmx
      glance.url: https://code.kamaji.gerardgascon.com
      glance.description: Edit server scripts
      glance.category: services
      glance.hide: false
      glance.id: code-server

networks:
  default:
    external: true
    name: nginx-proxy-manager
