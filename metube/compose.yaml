services:
  metube:
    image: ghcr.io/alexta69/metube
    container_name: metube
    volumes:
      - /mnt/NVMe/downloads/metube:/downloads
    restart: unless-stopped
    labels:
      glance.name: MeTube
      glance.icon: si:youtube
      glance.description: YouTube Video Downloader
      glance.url: https://youtube.kamaji.gerardgascon.com/admin
      glance.category: arr-stack
      glance.hide: false
      glance.id: metube

networks:
  default:
    external: true
    name: nginx-proxy-manager