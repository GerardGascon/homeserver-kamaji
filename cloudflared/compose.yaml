services:
  cloudflared:
    image: wisdomsky/cloudflared-web:latest
    container_name: cloudflared
    env_file:
      - .env
    environment:
      - BASIC_AUTH_USER=${BASIC_AUTH_USER}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS}
    volumes:
      - ./config:/config
    restart: unless-stopped
    labels:
      glance.name: Cloudflared
      glance.icon: si:cloudflare
      glance.url: https://cloudflared.kamaji.gerardgascon.com
      glance.description: Zero Trust Access
      glance.category: services
      glance.hide: false
      glance.id: cloudflared

networks:
  default:
    external: true
    name: nginx-proxy-manager