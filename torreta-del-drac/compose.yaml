services:
  torreta-del-drac:
    image: ghcr.io/gerardgascon/torreta-del-drac-server:latest
    container_name: torreta-del-drac
    env_file:
      - .env
    environment:
      DJANGO_SUPERUSER_PASSWORD: ${ADMIN_PASSWORD}
      DJANGO_SUPERUSER_USERNAME: ${ADMIN_USER}
      DJANGO_SUPERUSER_EMAIL: ${ADMIN_EMAIL}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - static:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4555/"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
  nginx:
    image: nginx:latest
    ports:
      - "4555:80"
    volumes:
      - static:/app/staticfiles
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      torreta-del-drac:
        condition: service_healthy
    restart: unless-stopped

volumes:
  static:

networks:
  default:
    external: true
    name: nginx-proxy-manager